<!doctype html>
<html lang="hu">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Liszt kalkulátor receptekhez</title>
  <link rel="stylesheet" href="./css/flour-calculator.css?v=2">
</head>
<body>
  <main class="spajz-calculator-page">
    <div id="spajz-flour-calculator" class="spajz-flour-calculator"></div>
  </main>

  <script src="./js/flour-calculator.js?v=2"></script>

  <script>
(function () {
  function sendHeightToParent() {
    var height = Math.max(
      document.body.scrollHeight,
      document.documentElement.scrollHeight,
      document.body.offsetHeight,
      document.documentElement.offsetHeight
    );

    window.parent.postMessage({
      type: "spajzCalculatorHeight",
      height: height
    }, "*");
  }

  window.addEventListener("load", sendHeightToParent);
  window.addEventListener("resize", sendHeightToParent);

  if (window.ResizeObserver) {
    var observer = new ResizeObserver(function () {
      sendHeightToParent();
    });

    observer.observe(document.body);
  }

  var images = document.querySelectorAll("img");
  images.forEach(function (img) {
    img.addEventListener("load", sendHeightToParent);
    img.addEventListener("error", sendHeightToParent);
  });

  setTimeout(sendHeightToParent, 300);
  setTimeout(sendHeightToParent, 1000);
  setTimeout(sendHeightToParent, 2000);
  setTimeout(sendHeightToParent, 4000);
})();
</script>
</body>
</html>
